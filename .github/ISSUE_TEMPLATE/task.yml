name: 작업 이슈
description: 에이전트가 처리할 작업 이슈
title: "[타입] "
labels: ["status:todo"]
body:
  - type: markdown
    attributes:
      value: |
        에이전트 파이프라인에서 처리할 작업 이슈입니다.

  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 작업 내용을 요약해주세요
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 배경
      description: 왜 이 작업이 필요한지 설명해주세요
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 완료 조건
      description: 이 작업이 완료되었다고 판단할 수 있는 조건들
      value: |
        - [ ] 조건 1
        - [ ] 조건 2
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: 의존성
      description: 선행/후행 이슈가 있다면 기재
      value: |
        - 선행: 없음
        - 후행: 없음
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - priority:low
        - priority:medium
        - priority:high
        - priority:critical
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: 크기
      options:
        - "size:s (1-2시간)"
        - "size:m (반나절)"
        - "size:l (1일)"
        - "size:xl (2일+)"
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: 타입
      options:
        - type:feature
        - type:bug
        - type:refactor
        - type:infra
    validations:
      required: true
