name: 에이전트 자동 디스패치 (이벤트 기반)

# 라벨 변경 시 해당 에이전트를 트리거하는 웹훅 기반 워크플로우
# orchestrator.sh의 폴링 방식을 보완/대체

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    # 봇이 추가한 라벨은 무시 (무한 루프 방지)
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: 라벨 기반 에이전트 디스패치
        uses: actions/github-script@v7
        with:
          script: |
            const label = context.payload.label?.name;
            if (!label) return;

            const number = context.payload.issue?.number || context.payload.pull_request?.number;
            const isPR = !!context.payload.pull_request;

            console.log(`라벨 감지: ${label}, #${number}, PR=${isPR}`);

            // 라벨 → 에이전트 매핑
            const DISPATCH_MAP = {
              // 이슈 라벨 → 개발자 에이전트
              'status:todo': null,  // agent:* 라벨과 조합 필요
              // PR 라벨 → 검증 에이전트
              'status:review': 'auditor',
              'status:audit-passed': 'reviewer',
              'status:qa': 'qa',
              'status:qa-passed': 'integrator',
              // 에러 복구
              'status:stalled': null,  // DevOps 알림
              'status:agent-failed': null,  // DevOps 알림
            };

            const agent = DISPATCH_MAP[label];

            if (agent) {
              console.log(`→ ${agent} 에이전트 디스패치 대상`);
              // 실제 디스패치는 self-hosted runner에서 dispatch-agent.sh 실행 필요
              // 여기서는 로그만 남기고, 실제 환경에서는 workflow_dispatch나 repository_dispatch로 연결
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                body: `🤖 **에이전트 디스패치 감지**\n\n- 라벨: \`${label}\`\n- 대상: \`${agent}\`\n- 시각: ${new Date().toISOString()}\n\n> self-hosted runner에서 \`dispatch-agent.sh ${agent} ${number}\` 실행 필요`,
              });
            }

            // 에러 상태 알림
            if (label === 'status:stalled' || label === 'status:agent-failed') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                body: `⚠️ **에이전트 이상 감지**\n\n- 상태: \`${label}\`\n- 시각: ${new Date().toISOString()}\n\n수동 확인이 필요합니다. \`.harness/logs/\`를 점검하세요.`,
              });
            }
